<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nati · Todo en un lugar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF6F2;
    --bg-alt:#F3ECE6;
    --card:#FFFFFF;
    --ink:#2B2230;
    --ink-soft:#6E6270;
    --line:#EAE0D8;
    --rose:#C96B84;
    --rose-deep:#A8506B;
    --rose-soft:#F5DEE4;
    --sage:#82A28E;
    --sage-soft:#E3ECE5;
    --gold:#C79A54;
    --gold-soft:#F3E7D0;
    --sky1:#F6D9C9;
    --sky2:#E7C4D1;
    --sky3:#C7CFE0;
    --radius:18px;
    --shadow:0 2px 14px rgba(43,34,48,0.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:86px;}
  h1,h2,h3{font-family:'Fraunces',serif;margin:0;font-weight:600;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  ::-webkit-scrollbar{display:none;}

  /* HEADER */
  .header{
    position:relative;
    padding:28px 20px 22px;
    overflow:hidden;
    border-radius:0 0 32px 32px;
    color:#3A2A33;
  }
  .header .glow{
    position:absolute;inset:-40% -20% auto -20%;height:220px;
    background:radial-gradient(60% 100% at 30% 0%, var(--sky1) 0%, transparent 70%),
               radial-gradient(50% 100% at 75% 10%, var(--sky2) 0%, transparent 70%),
               radial-gradient(60% 100% at 100% 40%, var(--sky3) 0%, transparent 70%);
    filter:blur(6px);
    opacity:0.9;
    z-index:0;
  }
  .header-content{position:relative;z-index:1;}
  .greeting-row{display:flex;justify-content:space-between;align-items:flex-start;}
  .greeting{font-size:26px;line-height:1.15;}
  .datestr{font-size:13px;color:var(--ink-soft);margin-top:4px;font-weight:500;}
  .ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
  .chips{display:flex;gap:8px;margin-top:16px;overflow-x:auto;padding-bottom:2px;}
  .chip{
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,0.7);
    border-radius:14px;
    padding:8px 12px;
    min-width:76px;
    flex-shrink:0;
  }
  .chip .label{font-size:10px;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);font-weight:700;}
  .chip .val{font-size:15px;font-weight:700;margin-top:2px;font-family:'IBM Plex Mono',monospace;}
  .chip button{background:none;border:none;color:var(--rose-deep);font-size:16px;font-weight:800;padding:0 4px;}

  /* TABS CONTENT */
  .section{padding:18px 20px 4px;}
  .section-title{font-size:19px;margin-bottom:2px;}
  .section-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
  .card-title{font-size:15px;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .card-title .tag{font-size:10.5px;font-weight:700;background:var(--rose-soft);color:var(--rose-deep);padding:3px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.03em;}
  .task{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:14px;line-height:1.4;border-bottom:1px solid var(--line);}
  .task:last-child{border-bottom:none;}
  .task input[type=checkbox]{margin-top:2px;width:17px;height:17px;accent-color:var(--rose);flex-shrink:0;}
  .task label{flex:1;}
  .task.done label{color:var(--ink-soft);text-decoration:line-through;}
  .pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .pill{font-size:12px;padding:5px 11px;border-radius:100px;border:1px solid var(--line);background:var(--bg-alt);color:var(--ink-soft);font-weight:600;}
  .pill.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn{background:var(--rose);color:#fff;border:none;border-radius:12px;padding:11px 16px;font-weight:700;font-size:14px;text-align:center;}
  .btn.secondary{background:var(--bg-alt);color:var(--ink);border:1px solid var(--line);}
  .btn.sage{background:var(--sage);}
  .btn.block{width:100%;}
  .btn.small{padding:7px 12px;font-size:12.5px;border-radius:9px;}
  .row{display:flex;gap:10px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat-block{background:var(--bg-alt);border-radius:14px;padding:12px;}
  .stat-block .k{font-size:11px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;}
  .stat-block .v{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .note{font-size:12.5px;color:var(--ink-soft);background:var(--bg-alt);border-radius:10px;padding:9px 11px;margin-top:8px;line-height:1.45;}
  input[type=text],input[type=date],textarea,select{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink);
  }
  textarea{resize:vertical;min-height:60px;}
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;gap:8px;}
  .list-item:last-child{border-bottom:none;}
  .del{color:var(--rose-deep);background:none;border:none;font-size:17px;padding:2px 6px;flex-shrink:0;}
  .empty{text-align:center;padding:28px 10px;color:var(--ink-soft);font-size:13.5px;}
  .empty .big{font-size:30px;display:block;margin-bottom:6px;}

  /* NAV */
  .navbar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:9px 4px 12px;z-index:50;
  }
  .navbtn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-soft);font-size:10px;font-weight:700;padding:4px 6px;border-radius:10px;}
  .navbtn .ic{font-size:19px;}
  .navbtn.active{color:var(--rose-deep);}

  .badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .badge{background:var(--bg-alt);border-radius:14px;padding:14px 10px;text-align:center;opacity:0.4;}
  .badge.unlocked{opacity:1;background:linear-gradient(160deg,var(--gold-soft),var(--card));border:1px solid var(--gold);}
  .badge .ic{font-size:26px;}
  .badge .t{font-size:11.5px;font-weight:700;margin-top:4px;}

  .day-picker{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
  .day-btn{flex-shrink:0;border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 12px;text-align:center;min-width:52px;}
  .day-btn .d{font-size:10px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;}
  .day-btn .n{font-size:15px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
  .day-btn.active{background:var(--ink);border-color:var(--ink);}
  .day-btn.active .d,.day-btn.active .n{color:#fff;}

  .meal-block{margin-bottom:12px;}
  .meal-block .hh{font-size:12px;font-weight:700;color:var(--rose-deep);display:flex;justify-content:space-between;}
  .meal-block .name{font-size:14.5px;font-weight:700;margin:2px 0 4px;}
  .meal-block ul{margin:0;padding-left:18px;font-size:13px;color:var(--ink-soft);line-height:1.5;}

  .flex-between{display:flex;justify-content:space-between;align-items:center;}
  .info-banner{background:var(--sage-soft);border:1px solid var(--sage);border-radius:12px;padding:10px 12px;font-size:12px;color:#3E5548;line-height:1.5;margin-bottom:14px;}
  .toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:100;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .subtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;}
  .dice{font-size:40px;text-align:center;padding:10px 0;}
</style>
</head>

function todayKey(d){ d = d || new Date(); return d.toISOString().slice(0,10); }
function dow(d){ return d.getDay(); } // 0 sun .. 6 sat

async function loadState(){
  try{
    if(window.storage){
      const r = await window.storage.get('app-state', false);
      if(r && r.value){ state = Object.assign(state, JSON.parse(r.value)); return; }
    }
  }catch(e){ /* window.storage not available here, try local fallback */ }
  try{
    const raw = localStorage.getItem('nati-app-state');
    if(raw){ state = Object.assign(state, JSON.parse(raw)); }
  }catch(e){ /* first run, nothing saved yet */ }
}
async function saveState(){
  try{ if(window.storage){ await window.storage.set('app-state', JSON.stringify(state), false); } }
  catch(e){ /* fall through to local */ }
  try{ localStorage.setItem('nati-app-state', JSON.stringify(state)); }
  catch(e){ console.error('storage error', e); }
}
function getLog(dateKey){
  if(!state.dailyLogs[dateKey]){
    state.dailyLogs[dateKey] = {training:false, eatingCount:0, water:0, mood:"", sleep:"", houseAM:false, houseNight:false, houseWeekly:false, tasksDone:{}};
  }
  return state.dailyLogs[dateKey];
}

/* ============================= HELPERS ============================= */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}
function esc(s){ return (s||"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function downloadBlobFile(filename, content){
  const blob = new Blob([content], {type:"text/calendar"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function downloadICS(title, dateKey, time){
  time = time || "09:00";
  const [y,m,d] = dateKey.split("-");
  const [hh,mm] = time.split(":");
  const dt = `${y}${m}${d}T${hh}${mm}00`;
  const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nUID:${Date.now()}@nati-app\nSUMMARY:${title.replace(/\n/g," ")}\nDTSTART:${dt}\nDTEND:${dt}\nEND:VEVENT\nEND:VCALENDAR`;
  downloadBlobFile(`${title.slice(0,30).replace(/\s+/g,'_')}.ics`, ics);
  toast("Descargado. Abrilo para agregarlo al Calendario del iPhone");
}

const DOW_ABBR = ["SU","MO","TU","WE","TH","FR","SA"];
function nextDateForDow(targetDow){
  const d = new Date();
  const diff = (targetDow - d.getDay() + 7) % 7;
  d.setDate(d.getDate() + diff);
  return d;
}
function fmtDT(date, time){
  const [hh,mm] = time.split(":");
  const y = date.getFullYear(), m = String(date.getMonth()+1).padStart(2,'0'), day = String(date.getDate()).padStart(2,'0');
  return `${y}${m}${day}T${hh}${mm}00`;
}
function buildVEvent(uid, title, date, time, byday){
  return `BEGIN:VEVENT\nUID:${uid}@nati-app\nSUMMARY:${title.replace(/\n/g," ")}\nDTSTART:${fmtDT(date,time)}\nDTEND:${fmtDT(date,time)}\nRRULE:FREQ=WEEKLY;BYDAY=${byday}\nEND:VEVENT`;
}
function generateWeeklyICS(){
  const events = [];
  // cierre de casa, todos los días
  events.push(buildVEvent('cierre-casa', 'Cierre de casa (noche)', nextDateForDow(new Date().getDay()), "21:30", DOW_ABBR.join(",")));
  // entrenamiento por día
  for(let dw=0; dw<7; dw++){
    const w = WORKOUT[dw];
    events.push(buildVEvent('entreno-'+dw, 'Entrenamiento — '+w.title, nextDateForDow(dw), "18:00", DOW_ABBR[dw]));
  }
  // limpieza por día
  for(let dw=0; dw<7; dw++){
    const c = CLEAN_WEEKLY[dw];
    events.push(buildVEvent('limpieza-'+dw, 'Casa — '+c.title, nextDateForDow(dw), "19:00", DOW_ABBR[dw]));
  }
  return `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Nati App//ES\n${events.join("\n")}\nEND:VCALENDAR`;
}
function downloadWeeklyICS(){
  downloadBlobFile('Rutina_semanal_Nati.ics', generateWeeklyICS());
  toast("Descargado. Abrilo una sola vez y se repite solo cada semana");
}

function weekOfMonth(d){
  const day = d.getDate();
  return Math.ceil(day/7);
}

function renderHeader(){
  const now = new Date();
  const hh = now.getHours();
  const greet = hh<12 ? "Buenos días" : hh<20 ? "Buenas tardes" : "Buenas noches";
  document.getElementById('greetingText').textContent = `${greet}, Nati`;
  document.getElementById('dateText').textContent = `Hoy es ${DAY_NAMES[now.getDay()].toLowerCase()} ${now.getDate()} de ${MONTH_NAMES[now.getMonth()]}`;

  const key = todayKey();
  const log = getLog(key);
  const parts = [log.training, log.eatingCount>=4, log.houseAM, log.houseNight, log.water>=2];
  const done = parts.filter(Boolean).length;
  const pct = Math.round(done/parts.length*100);
  const circumference = 169.6;
  const ring = document.getElementById('ringProgress');
  ring.setAttribute('stroke-dashoffset', circumference - (circumference*pct/100));
  document.getElementById('ringLabel').textContent = pct+"%";

  const chips = [
    {label:"Entren.", val: log.training ? "✅" : "—"},
    {label:"Agua", val: `${log.water}b · ${(log.water*0.9).toFixed(1)}L`, adj:true, key:'water', max:6},
    {label:"Ánimo", val: log.mood || "—"},
    {label:"Sueño", val: log.sleep ? log.sleep+"h" : "—"},
    {label:"Racha", val: state.streak+"d"}
  ];
  document.getElementById('chipsRow').innerHTML = chips.map(c=>{
    if(c.adj){
      return `<div class="chip"><div class="label">${c.label}</div><div class="val" style="display:flex;align-items:center;gap:4px;">
        <button onclick="adjWater(-1)">−</button>${c.val}<button onclick="adjWater(1)">+</button></div></div>`;
    }
    return `<div class="chip"><div class="label">${c.label}</div><div class="val">${c.val}</div></div>`;
  }).join("");
}
function adjWater(delta){
  const log = getLog(todayKey());
  log.water = Math.max(0, Math.min(6, log.water + delta));
  saveState(); renderHeader();
}

function toggleSimple(field, dateKey){
  dateKey = dateKey || todayKey();
  const log = getLog(dateKey);
  log[field] = !log[field];
  if(field==='training' && log.training && dateKey===todayKey()){ bumpStreak(); }
  saveState(); renderHeader(); RENDERERS[activeTab]();
}
function setEating(n, dateKey){
  dateKey = dateKey || todayKey();
  const log = getLog(dateKey);
  log.eatingCount = (log.eatingCount===n) ? n-1 : n;
  saveState(); renderHeader(); RENDERERS[activeTab]();
}
function bumpStreak(){
  const key = todayKey();
  if(state.lastStreakDate === key) return;
  const yest = new Date(); yest.setDate(yest.getDate()-1);
  if(state.lastStreakDate === todayKey(yest)){ state.streak += 1; }
  else { state.streak = 1; }
  state.lastStreakDate = key;
}
function pickRandomMeal(){
  const menu = MENU[todayKey()];
  const pool = menu ? menu.meals.filter(m=>!m.fuera) : [];
  if(!pool.length){ document.getElementById('diceResult').innerHTML = "No hay opciones para hoy 🤷‍♀️"; return; }
  const pick = pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('diceResult').innerHTML = `<div style="font-size:15px;font-weight:700;">${esc(pick.nombre)}</div><div style="font-size:11.5px;color:var(--ink-soft);margin-top:4px;">${pick.hora} · ${pick.tipo}</div>`;
}

      <button class="btn small secondary" onclick="shiftMonth(1)">›</button>
    </div>

      ${DAY_SHORT.map(s=>`<div>${s[0]}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
    ${cells.map(day=>{
       if(!day) return `<div></div>`;
       const key = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
       const log = state.dailyLogs[key];
       let dot = "";
       if(log){
         const all = log.training && log.houseAM && log.houseNight && log.eatingCount>=4;
         const some = log.training || log.houseAM || log.houseNight || log.eatingCount>0;
         dot = all ? "🟢" : (some ? "🟡" : "");
       }
       const isToday = key===todayK, isSel = key===curKey;
       return `<button onclick="selectCalDay('${key}')" style="aspect-ratio:1;border-radius:10px;border:${isSel?'2px solid var(--rose-deep)':'1px solid var(--line)'};background:${isToday?'var(--rose-soft)':'#fff'};font-family:'IBM Plex Mono',monospace;font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;">
         <span>${day}</span><span style="font-size:8px;">${dot||'&nbsp;'}</span>
       </button>`;
    }).join("")}
    </div>

  </div>`;
}

      </div>
      <div class="card"><div class="card-title">💧 Recordatorios</div>
      <ul style="padding-left:18px;font-size:13.5px;line-height:1.7;"><li>Llevar botella de agua</li><li>Entrenar con buena técnica</li><li>Registrar pesos utilizados</li><li>Comer proteína después del entrenamiento</li><li>Dormir al menos 7-8 horas</li></ul></div>`;

    const clean = CLEAN_WEEKLY[dw];

/* ============================= TAB: SUPER ============================= */
function renderSuper(){
  const key = todayKey();
  const menu = MENU[key];
  const todayItems = menu ? [...new Set(menu.meals.flatMap(m=>m.items))] : [];

  const weekItems = [...new Set(Object.values(MENU).flatMap(d=>d.meals.flatMap(m=>m.items)))];
  const byCat = {};
  weekItems.forEach(id=>{
    const ing = INGREDIENTS[id]; if(!ing) return;
    byCat[ing.c] = byCat[ing.c] || [];
    byCat[ing.c].push(id);
  });

  let html = `<div class="section">
    <div class="section-title">Lista del súper</div>
    <div class="section-sub">Se arma sola con el menú de la semana</div>`;

  if(todayItems.length){
    html += `<div class="card">
      <div class="card-title">🔔 Lo que se suma hoy</div>
      <div class="pill-row">${todayItems.map(id=>`<span class="pill">${INGREDIENTS[id]?INGREDIENTS[id].n:id}</span>`).join("")}</div>
    </div>`;
  }

  html += `<div class="card"><div class="card-title">🛒 Lista completa de la semana</div>`;
  Object.keys(byCat).forEach(cat=>{
    html += `<div style="font-size:12px;font-weight:700;color:var(--rose-deep);margin:10px 0 4px;">${cat}</div>`;
    byCat[cat].forEach(id=>{
      const checked = !!state.groceryChecked[id];
      html += `<div class="task ${checked?'done':''}"><input type="checkbox" ${checked?'checked':''} onchange="toggleGrocery('${id}')"><label>${INGREDIENTS[id].n}</label></div>`;
    });
  });
  html += `<button class="btn secondary block" style="margin-top:12px;" onclick="clearGrocery()">Vaciar lista (nueva semana)</button></div>`;
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}
function toggleGrocery(id){ state.groceryChecked[id] = !state.groceryChecked[id]; saveState(); renderSuper(); }
function clearGrocery(){ state.groceryChecked = {}; saveState(); renderSuper(); toast("Lista vaciada"); }

function toggleTask(id){

  log.tasksDone[id] = !log.tasksDone[id];
  saveState(); renderCasa();
}
function addMaint(){
  const t = document.getElementById('maintText').value.trim();
  const due = document.getElementById('maintDate').value;
  if(!t) return;
  state.homeMaintenance.push({t,due});
  saveState(); renderCasa(); toast("Agregado");
}
function delMaint(i){ state.homeMaintenance.splice(i,1); saveState(); renderCasa(); }
function waterPlant(i){ state.plants[i].last = todayKey(); saveState(); renderCasa(); toast("Regada 💧"); }

/* ============================= TAB: LOGROS ============================= */
function renderHistoryRows(){
  const keys = Object.keys(state.dailyLogs).sort().reverse().slice(0,14);
  if(!keys.length) return `<div class="empty">Todavía no hay días guardados.</div>`;
  return keys.map(k=>{
    const l = state.dailyLogs[k];
    const d = new Date(k+"T00:00:00");
    const label = `${DAY_SHORT[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
    return `<div class="list-item">
      <span class="mono" style="font-size:12px;">${label}</span>
      <span style="font-size:15px;display:flex;gap:6px;">
        <span title="Entrenamiento">${l.training?'🏋️':'▫️'}</span>
        <span title="Comidas" class="mono" style="font-size:12px;">${l.eatingCount||0}/4</span>
        <span title="Agua" class="mono" style="font-size:12px;">💧${l.water||0}b</span>
        <span title="Casa">${(l.houseAM&&l.houseNight)?'🏡':'▫️'}</span>
      </span>
    </div>`;
  }).join("");
}
function renderLogros(){
  const trainDays = Object.values(state.dailyLogs).filter(l=>l.training).length;
  const houseDays = Object.values(state.dailyLogs).filter(l=>l.houseAM && l.houseNight).length;
  const waterTotal = Object.values(state.dailyLogs).reduce((s,l)=>s+(l.water||0),0);
  const badges = [
    {ic:"🥉", t:"7 días entrenando", on: trainDays>=7},
    {ic:"🥈", t:"30 días sin faltar", on: state.streak>=30},
    {ic:"🥇", t:"100 litros de agua", on: (waterTotal*0.9)>=100},
    {ic:"🏡", t:"Casa impecable 30 días", on: houseDays>=30}
  ];
  let html = `<div class="section">
    <div class="section-title">Logros</div>
    <div class="section-sub">Racha actual: <b>${state.streak} días</b></div>
    <div class="badge-grid">
      ${badges.map(b=>`<div class="badge ${b.on?'unlocked':''}"><div class="ic">${b.ic}</div><div class="t">${b.t}</div></div>`).join("")}
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="card-title">📜 Historial</div>
      <div class="note" style="margin-bottom:10px;">Cada día que pasa queda guardado acá solo, no hay que hacer nada.</div>
      ${renderHistoryRows()}
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="card-title">🎁 Recompensas</div>
      <div class="note" style="margin-bottom:10px;">No es un premio por portarte bien — es una forma de celebrar lo que ya lograste.</div>
      ${REWARDS.map(r=>{
        const claimed = state.claimedRewards.includes(r);
        return `<div class="list-item"><span>${claimed?'✅ ':''}${r}</span><button class="btn small ${claimed?'secondary':''}" onclick="claimReward('${r.replace(/'/g,"\\'")}')">${claimed?'Elegida':'Elegir'}</button></div>`;
      }).join("")}
    </div>
  </div>`;
  document.getElementById('content').innerHTML = html;
}
function claimReward(r){
  if(!state.claimedRewards.includes(r)){ state.claimedRewards.push(r); toast("✨ Disfrutala"); }
  else { state.claimedRewards = state.claimedRewards.filter(x=>x!==r); }
  saveState(); renderLogros();
}

function delBrain(i){ state.brainDump.splice(i,1); saveState(); renderMas(); }
function brainToICS(i){ downloadICS(state.brainDump[i], todayKey(), "09:00"); }
function addGift(){

  const idea = document.getElementById('giftIdea').value.trim();
  if(!person || !idea) return;
  state.giftIdeas.push({person, idea});

/* ============================= NAV / INIT ============================= */
const RENDERERS = {hoy:renderHoy, semana:renderSemana, super:renderSuper, casa:renderCasa, logros:renderLogros, mas:renderMas};
function setActiveTab(tab){
  activeTab = tab;
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  RENDERERS[tab]();
}
document.querySelectorAll('.navbtn').forEach(b=>b.addEventListener('click', ()=>setActiveTab(b.dataset.tab)));

(async function init(){
  window.addEventListener('error', function(){
    const c = document.getElementById('content');
    if(c && !c.innerHTML.trim()){
      c.innerHTML = '<div class="section"><div class="empty"><span class="big">😕</span>Algo no cargó bien. Cerrá esta pantalla y volvé a abrirla.</div></div>';
    }
  });
  await loadState();
  try{ renderHeader(); }catch(e){ console.error(e); }
  try{ setActiveTab('hoy'); }catch(e){ console.error(e); document.getElementById('content').innerHTML = '<div class="section"><div class="empty"><span class="big">😕</span>Algo no cargó bien. Cerrá esta pantalla y volvé a abrirla.</div></div>'; }
  setInterval(()=>{ try{ renderHeader(); }catch(e){} }, 60000);
})();
</script>
